name = "surikata"
main = "src/index.ts"
compatibility_date = "2024-09-23"

[[d1_databases]]
binding = "DB"
database_name = "surikata-db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[triggers]
crons = ["*/15 * * * *"]

[vars]
# Override in production with: wrangler secret put JWT_SECRET
JWT_SECRET = "dev-only-insecure-secret-change-me"

[assets]
directory = "./public"
binding = "ASSETS"
